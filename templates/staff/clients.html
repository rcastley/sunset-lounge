{% extends "base.html" %}
{% block title %}Clients — Sunset Lounge{% endblock %}
{% block body %}
{% include 'partials/_staff_nav.html' %}
<main class="max-w-7xl mx-auto px-6 md:px-10 py-8">
  <div class="flex items-baseline justify-between">
    <div>
      <p class="uppercase tracking-[0.35em] text-[10px] text-terracotta">Roster</p>
      <h1 class="font-display text-3xl md:text-4xl text-ink mt-2">All clients</h1>
    </div>
    <p class="text-ink/50 text-sm">{{ clients|length }} shown</p>
  </div>

  <div class="mt-5 bg-cream rounded-2xl border border-sand shadow-card p-4">
    <label class="label">Filter by name or phone</label>
    <div class="relative">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-ink/40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1 0 6.15 6.15a7.5 7.5 0 0 0 10.5 10.5z"/></svg>
      <input type="search" name="q" value="{{ q }}" placeholder="Start typing…"
             class="w-full bg-cream pl-11 pr-9 py-3 text-base rounded-xl border-2 border-sand focus:border-coral outline-none transition"
             hx-get="{{ url_for('staff_clients') }}"
             hx-trigger="input changed delay:200ms, search"
             hx-target="#client-list"
             hx-indicator="#client-indicator"
             hx-push-url="true"
             autocomplete="off" />
      <span id="client-indicator" class="htmx-indicator absolute right-4 top-1/2 -translate-y-1/2 text-terracotta text-sm font-medium">…</span>
    </div>
  </div>

  <div id="client-list" class="mt-4">
    {% include 'partials/_client_list.html' %}
  </div>
</main>
{% endblock %}
