services:
  app:
    build: .
    image: sunset-lounge
    container_name: sunset-lounge
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5800}:8000"
    env_file:
      - .env
    volumes:
      - sunset-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/', timeout=2).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sunset-data:
