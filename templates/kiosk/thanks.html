{% extends "base.html" %}
{% block title %}Welcome to the lounge{% endblock %}
{% block body %}
<main class="min-h-screen sunset-bg relative overflow-hidden flex items-center justify-center px-8 py-12">
  <meta http-equiv="refresh" content="10; url={{ url_for('index') }}" />
  <div class="absolute inset-0 grain opacity-30 mix-blend-soft-light"></div>
  <div class="absolute -top-32 left-1/2 -translate-x-1/2 w-[700px] h-[700px] rounded-full bg-peach/30 blur-3xl"></div>

  <div class="relative text-center max-w-2xl">
    <div class="inline-block rounded-3xl px-8 py-6 logo-card anim-sun-rise">
      <img src="{{ url_for('static', filename='images/logo.jpg') }}"
           alt="Sunset Tanning Lounge"
           class="logo-blend w-44 md:w-52 h-auto object-contain select-none pointer-events-none"
           draggable="false" />
    </div>

    <p class="uppercase tracking-[0.4em] text-cream/85 text-xs mt-10 anim-up delay-1">You're in</p>
    <h1 class="font-display text-5xl md:text-7xl text-cream mt-4 anim-up delay-2 leading-tight">
      Welcome, <em class="italic">{{ name }}</em>.
    </h1>
    <p class="mt-6 text-xl text-cream/85 anim-up delay-3 leading-relaxed">
      Please step over to the desk — our team will help you pick the right package and get your first session going.
    </p>
    <a href="{{ url_for('index') }}"
       class="mt-12 inline-block text-cream/70 hover:text-cream uppercase tracking-[0.3em] text-xs anim-up delay-4">
      Return to start
    </a>
  </div>
</main>
{% endblock %}
