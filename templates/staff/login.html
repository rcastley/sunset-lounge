{% extends "base.html" %}
{% block title %}Staff sign in{% endblock %}
{% block body %}
<main class="min-h-screen bg-gradient-to-br from-plum via-ember to-terracotta relative overflow-hidden flex items-center justify-center px-6 py-6">
  <div class="absolute inset-0 grain opacity-25 mix-blend-soft-light"></div>
  <div class="absolute -top-32 -left-20 w-96 h-96 rounded-full bg-coral/40 blur-3xl"></div>
  <div class="absolute -bottom-32 -right-20 w-[500px] h-[500px] rounded-full bg-peach/25 blur-3xl"></div>

  <div class="relative w-full max-w-md">
    <div class="mb-4">
      <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2 text-cream/70 hover:text-cream text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Exit
      </a>
    </div>

    <div class="text-center mb-6">
      <div class="inline-block rounded-2xl px-5 py-3 logo-card mb-4">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}"
             alt="Sunset Tanning Lounge"
             class="logo-blend h-10 w-auto object-contain select-none pointer-events-none"
             draggable="false" />
      </div>
      <p class="uppercase tracking-[0.4em] text-[10px] text-cream/60">Staff portal</p>
      <h1 class="font-display text-4xl text-cream mt-2">Enter your PIN</h1>
    </div>

    <form method="post" id="pinForm" class="bg-ink/40 backdrop-blur rounded-3xl p-5 border border-cream/10 shadow-card">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <input type="hidden" name="pin" id="pinInput" />
      <div id="dots" class="flex justify-center gap-3 my-2 h-8 items-center"></div>
      {% if error %}<p class="text-center text-blush/95 text-sm mt-1 mb-2">{{ error }}</p>{% endif %}

      <div class="grid grid-cols-3 gap-2.5 mt-3">
        {% for n in [1,2,3,4,5,6,7,8,9] %}
        <button type="button" data-k="{{n}}" class="key h-16 rounded-2xl bg-cream/10 hover:bg-cream/20 active:bg-cream/30 text-cream text-2xl font-display transition">{{ n }}</button>
        {% endfor %}
        <button type="button" data-k="clear" class="key h-16 rounded-2xl bg-cream/5 hover:bg-cream/15 text-cream/70 text-[10px] uppercase tracking-[0.2em] transition">Clear</button>
        <button type="button" data-k="0" class="key h-16 rounded-2xl bg-cream/10 hover:bg-cream/20 active:bg-cream/30 text-cream text-2xl font-display transition">0</button>
        <button type="button" data-k="back" aria-label="Delete" class="key h-16 rounded-2xl bg-cream/5 hover:bg-cream/15 text-cream/70 transition flex items-center justify-center">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l5-5h11a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H8l-5-5z M14 9l-4 4 m0-4l4 4"/></svg>
        </button>
      </div>
      <button id="pinSubmit" type="submit" disabled class="mt-4 w-full h-12 rounded-2xl bg-peach text-ink font-semibold disabled:opacity-40 disabled:cursor-not-allowed transition">
        Sign in
      </button>
    </form>
  </div>

  <script>
    (function () {
      const MIN = 4, MAX = 6;
      let pin = "";
      const dots = document.getElementById("dots");
      const input = document.getElementById("pinInput");
      const form = document.getElementById("pinForm");
      const submit = document.getElementById("pinSubmit");

      function render() {
        dots.innerHTML = "";
        const n = Math.max(MIN, pin.length || MIN);
        for (let i = 0; i < n; i++) {
          const d = document.createElement("span");
          d.className = "w-4 h-4 rounded-full transition " +
            (i < pin.length ? "bg-peach shadow-sun" : "bg-cream/20");
          dots.appendChild(d);
        }
        input.value = pin;
        submit.disabled = pin.length < MIN;
      }
      render();

      document.querySelectorAll(".key").forEach(b => {
        b.addEventListener("click", () => {
          const k = b.dataset.k;
          if (k === "back") pin = pin.slice(0, -1);
          else if (k === "clear") pin = "";
          else if (pin.length < MAX) pin += k;
          render();
        });
      });

      document.addEventListener("keydown", e => {
        if (/^[0-9]$/.test(e.key)) {
          if (pin.length < MAX) pin += e.key;
          render();
        } else if (e.key === "Backspace") {
          pin = pin.slice(0, -1); render();
        } else if (e.key === "Enter" && pin.length >= MIN) {
          form.submit();
        }
      });
    })();
  </script>
</main>
{% endblock %}
