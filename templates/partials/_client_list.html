{% if clients %}
<div class="bg-white rounded-2xl border border-sand shadow-card overflow-hidden">
  <div class="grid grid-cols-12 px-5 py-3 text-[10px] uppercase tracking-[0.22em] text-ink/50 border-b border-sand">
    <div class="col-span-6">Name</div>
    <div class="col-span-3">Phone</div>
    <div class="col-span-3 text-right">Balance</div>
  </div>
  {% for c in clients %}
  <a href="{{ url_for('staff_client_detail', cid=c.id) }}"
     class="grid grid-cols-12 px-5 py-3.5 items-center hover:bg-sand/40 transition border-b border-sand/60 last:border-b-0">
    <div class="col-span-6 font-display text-lg text-ink truncate">{{ c.first_name }} {{ c.last_name }}</div>
    <div class="col-span-3 text-ink/60 text-sm truncate">{{ c.phone or '—' }}</div>
    <div class="col-span-3 text-right">
      <span class="chip {% if c.balance > 0 %}bg-coral/15 text-terracotta{% else %}bg-ink/10 text-ink/60{% endif %}">
        {{ c.balance }} min
      </span>
    </div>
  </a>
  {% endfor %}
</div>
{% elif q %}
<p class="text-ink/50 text-sm py-6">No matches for "<span class="text-ink/80">{{ q }}</span>".</p>
{% else %}
<p class="text-ink/50 text-sm py-6">No clients yet — register one from the kiosk.</p>
{% endif %}
