{% if q and not results %}
  <p class="text-ink/50 py-6 px-2">No matches for "<span class="text-ink/80">{{ q }}</span>".</p>
{% elif results %}
  <ul class="divide-y divide-sand">
    {% for c in results %}
    <li>
      <a href="{{ url_for('staff_client_detail', cid=c.id) }}"
         class="flex items-center justify-between py-4 px-4 -mx-4 rounded-2xl hover:bg-sand/40 transition">
        <div>
          <p class="font-display text-2xl text-ink">{{ c.first_name }} {{ c.last_name }}</p>
          <p class="text-sm text-ink/50 mt-0.5">{{ c.phone or '—' }}</p>
        </div>
        <span class="chip {% if c.balance > 0 %}bg-coral/15 text-terracotta{% else %}bg-ink/10 text-ink/60{% endif %}">
          {{ c.balance }} min
        </span>
      </a>
    </li>
    {% endfor %}
  </ul>
{% endif %}
