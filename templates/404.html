{% extends "base.html" %}
{% block title %}Lost the trail — Sunset Tanning Lounge{% endblock %}
{% block body %}
<main class="min-h-screen sunset-bg relative overflow-hidden flex items-center justify-center px-8 py-12">
  <div class="absolute inset-0 grain opacity-30 mix-blend-soft-light"></div>
  <div class="absolute -top-32 left-1/2 -translate-x-1/2 w-[700px] h-[700px] rounded-full bg-peach/30 blur-3xl"></div>

  <div class="relative text-center max-w-xl">
    <div class="inline-block rounded-3xl px-8 py-6 logo-card anim-sun-rise">
      <img src="{{ url_for('static', filename='images/logo.jpg') }}"
           alt="Sunset Tanning Lounge"
           class="logo-blend w-44 md:w-52 h-auto object-contain select-none pointer-events-none"
           draggable="false" />
    </div>

    <p class="uppercase tracking-[0.4em] text-cream/85 text-xs mt-10 anim-up delay-1">404</p>
    <h1 class="font-display text-5xl md:text-6xl text-cream mt-4 anim-up delay-2 leading-tight">
      Lost the <em class="italic">trail</em>.
    </h1>
    <p class="mt-5 text-lg text-cream/85 anim-up delay-3 leading-relaxed">
      That page isn't here. It may have moved, or the link could be a little off.
    </p>

    <a href="{{ url_for('index') }}"
       class="mt-10 btn-sunset inline-flex items-center gap-3 !px-8 !py-4 !text-lg anim-up delay-4">
      Back to the lounge
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
    </a>
  </div>
</main>
{% endblock %}
